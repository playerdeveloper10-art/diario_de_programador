<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela inicial</title>
    <style>
        * {
            max-width: 78vw;
            height: 6vh;


        }
        
        
        body {
            position: relative;
            background-image: url('https://thumbs.dreamstime.com/b/fundo-da-conex%C3%A3o-internet-sentido-abstrato-ci%C3%AAncia-e-projeto-gr%C3%A1fico-de-tecnologia-rede-global-130856051.jpg');
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-position: 100px;

        }
        
        
        
        h1#main {
            font-size: 5em;
            position: absolute;
            top: 50%;
            right: 50%;
            transform: translate(50%, 50%);
            font-family: Arial, Helvetica, sans-serif;
        }

        .description {
            transform: translate(13%, 440px);
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1.3em;
        }



    </style>



</head>
<body>
    <h1 id="main">Projeto Marketing Industrial</h1>
    <p class="description">Meu primeiro megaprojeto para arrecadar dinheiro</p>




    
</body>
</html>
